# forge-core default configuration.
# Override: create config.yaml (gitignored) with only the fields you want to change.

# Architecture Decision Records (https://adr.github.io/)
adr:
    prefix: number                      # "date" → YYYY-MM-DD  |  "number" → NNNN
    directory: docs/decisions
    template: templates/forge-adr.md
    schema: templates/forge-adr.json
    mdschema: docs/decisions/.mdschema

agents:
    DataAnalyst:
        model: fast
        tools: Read, Grep, Glob, WebSearch, WebFetch
    DocumentationWriter:
        model: fast
        tools: Read, Grep, Glob
    ForensicAgent:
        model: fast
        tools: Read, Grep, Glob, Bash
    ProductManager:
        model: fast
        tools: Read, Grep, Glob, WebSearch, WebFetch
    ProvenanceAuditor:
        model: fast
        tools: Read, Grep, Glob, Bash
    SecurityArchitect:
        model: fast
        tools: Read, Grep, Glob, Bash, WebSearch
    SystemArchitect:
        model: fast
        tools: Read, Grep, Glob
    TheOpponent:
        model: fast
        tools: Read, Grep, Glob, WebSearch
    WebResearcher:
        model: fast
        tools: Read, Grep, Glob, WebSearch, WebFetch

hooks:
    PlanCopy:
        destination: ""                     # override in config.yaml (e.g., docs/plans)
        template: templates/plan.md
    ArchitectureDecision:
        prompt: >-
            Invoke the ArchitectureDecision skill to check for uncaptured architectural decisions
            from the previous context. Spawn a background Agent to review the session for architectural
            decisions, pattern choices, or convention changes that should be captured as ADRs in
            docs/decisions/. Have the agent read the transcript JSONL from the session files below.
            Use the forge-adr template (templates/forge-adr.md).
            If c0ntextkeeper is installed, use the ContextKeeper skill to recover additional session details.
