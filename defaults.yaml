        PublishPrompts:

hooks:
    PlanCopy:
        destination: Resources/Plans/Claude
        template: templates/plan.md
    ArchitectureDecision:
        prompt: >-
            Invoke the ArchitectureDecision skill to check for uncaptured architectural decisions
            from the previous context. Spawn a background Agent to review the session for architectural
            decisions, pattern choices, or convention changes that should be captured as ADRs in
            docs/decisions/. Have the agent read the transcript JSONL from the session files below.
            Use the MADR light template (templates/madr.md).
            If c0ntextkeeper is installed, use the ContextKeeper skill to recover additional session details.
