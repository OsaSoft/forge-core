# forge-core default configuration.
# Override: create config.yaml (gitignored) with only the fields you want to change.

# Architecture Decision Records (https://adr.github.io/)
adr:
    prefix: number                      # "date" → YYYY-MM-DD  |  "number" → NNNN
    directory: docs/decisions
    template: templates/madr.md
    full_template: templates/adr.md
    schema: docs/decisions/.mdschema

skills:
    claude:
        AdaptPrompts:
        BuildSkill:
        BuildAgent:
        BuildModule:
        BuildHook:
        BuildPlugin:
        ArchitectureDecision:
        VersionControl:
        MarkdownLint:
        MarkdownSchema:
        SettingsMaintenance:
        SystemCheck:
        RTK:
        PromptAnalysis:
        PublishPrompts:

    gemini:
        AdaptPrompts:
        BuildSkill:
        BuildAgent:
        BuildModule:
        BuildHook:
        BuildPlugin:
        ArchitectureDecision:
        VersionControl:
        MarkdownLint:
        MarkdownSchema:
        SettingsMaintenance:
        SystemCheck:
        RTK:
        PromptAnalysis:
        PublishPrompts:

    codex:
        AdaptPrompts:
        BuildSkill:
        BuildAgent:
        BuildModule:
        BuildHook:
        BuildPlugin:
        ArchitectureDecision:
        VersionControl:
        MarkdownLint:
        MarkdownSchema:
        SettingsMaintenance:
        SystemCheck:
        RTK:
